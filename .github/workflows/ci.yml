name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Homebrew dependencies
        run: brew install nlopt boost pybind11

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PDM
        run: pip install pdm

      - name: Cache PDM dependencies
        uses: actions/cache@v4
        with:
          path: .venv
          key: pdm-${{ runner.os }}-${{ hashFiles('pdm.lock') }}
          restore-keys: |
            pdm-${{ runner.os }}-

      - name: Install Python dependencies
        run: pdm install

      - name: Build C++ extension
        run: |
          cmake -B build > /tmp/cmake_config.log 2>&1
          EC1=$?
          cmake --build build > /tmp/cmake_build.log 2>&1
          EC2=$?
          if [ $EC1 -ne 0 ]; then
            echo "::error file=CMakeLists.txt,title=cmake configure failed (exit $EC1)::"
            grep -i -E "error|fatal" /tmp/cmake_config.log | head -10 | sed 's/^/::error::/'
            exit $EC1
          fi
          if [ $EC2 -ne 0 ]; then
            echo "::error file=CMakeLists.txt,title=cmake build failed (exit $EC2)::"
            grep -i -E "error|fatal" /tmp/cmake_build.log | head -20 | sed 's/^/::error::/'
            exit $EC2
          fi

      - name: Run C++ tests
        run: cd build && ctest --output-on-failure

      - name: Run Python tests
        continue-on-error: true
        run: |
          python tests/py_tests/garch_test.py
          python tests/py_tests/heston_fit.py
