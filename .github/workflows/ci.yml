name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Homebrew dependencies
        run: brew install nlopt boost pybind11

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PDM
        run: pip install pdm

      - name: Cache PDM dependencies
        uses: actions/cache@v4
        with:
          path: .venv
          key: pdm-${{ runner.os }}-${{ hashFiles('pdm.lock') }}
          restore-keys: |
            pdm-${{ runner.os }}-

      - name: Install Python dependencies
        run: pdm install

      - name: Build C++ extension
        continue-on-error: true
        run: |
          cmake -B build > /tmp/cmk_cfg.log 2>&1
          echo $? > /tmp/ci_cfg_rc.txt
          cmake --build build > /tmp/cmk_bld.log 2>&1
          echo $? > /tmp/ci_bld_rc.txt
          echo "config=$(cat /tmp/ci_cfg_rc.txt) build=$(cat /tmp/ci_bld_rc.txt)"

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ github.run_id }}
          path: |
            /tmp/cmk_cfg.log
            /tmp/cmk_bld.log
            /tmp/ci_cfg_rc.txt
            /tmp/ci_bld_rc.txt
          retention-days: 1

      - name: Fail if build errored
        if: always()
        run: |
          EC1=$(cat /tmp/ci_cfg_rc.txt 2>/dev/null)
          EC2=$(cat /tmp/ci_bld_rc.txt 2>/dev/null)
          echo "config_exit=$EC1 build_exit=$EC2"
          [ -z "$EC1" ] && { echo "::error::Missing config exit code"; exit 1; }
          [ -z "$EC2" ] && { echo "::error::Missing build exit code"; exit 1; }
          [ "$EC1" != "0" ] && { echo "::error::cmake configure failed ($EC1)"; head -10 /tmp/cmk_cfg.log; exit 1; }
          [ "$EC2" != "0" ] && { echo "::error::cmake build failed ($EC2)"; tail -30 /tmp/cmk_bld.log; exit 1; }
          echo "Build succeeded"

      - name: Run C++ tests
        run: cd build && ctest --output-on-failure

      - name: Run Python tests
        continue-on-error: true
        run: |
          python tests/py_tests/garch_test.py
          python tests/py_tests/heston_fit.py
