name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Homebrew dependencies
        run: brew install nlopt boost pybind11

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PDM
        run: pip install pdm

      - name: Cache PDM dependencies
        uses: actions/cache@v4
        with:
          path: .venv
          key: pdm-${{ runner.os }}-${{ hashFiles('pdm.lock') }}
          restore-keys: |
            pdm-${{ runner.os }}-

      - name: Install Python dependencies
        run: pdm install

      - name: Build C++ extension
        shell: bash
        run: |
          set -o pipefail
          cmake -B build 2>&1 | tee /tmp/cmk_cfg.log
          EC1=$?
          set +o pipefail
          if [ $EC1 -ne 0 ]; then
            echo "::error title=cmake configure failed (exit $EC1)::"
            tail -20 /tmp/cmk_cfg.log | head -20 | while IFS= read -r line; do echo "::error::$line"; done
            exit $EC1
          fi
          set -o pipefail
          cmake --build build 2>&1 | tee /tmp/cmk_bld.log
          EC2=$?
          set +o pipefail
          if [ $EC2 -ne 0 ]; then
            echo "::error title=cmake build failed (exit $EC2)::"
            tail -40 /tmp/cmk_bld.log | head -40 | while IFS= read -r line; do echo "::error::$line"; done
            exit $EC2
          fi

      - name: Run C++ tests
        run: cd build && ctest --output-on-failure

      - name: Run Python tests
        continue-on-error: true
        run: |
          python tests/py_tests/garch_test.py
          python tests/py_tests/heston_fit.py
