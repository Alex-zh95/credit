name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Homebrew dependencies
        run: brew install nlopt boost

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PDM
        run: pip install pdm

      - name: Cache PDM dependencies
        uses: actions/cache@v4
        with:
          path: .venv
          key: pdm-${{ runner.os }}-${{ hashFiles('pdm.lock') }}
          restore-keys: |
            pdm-${{ runner.os }}-

      - name: Install Python dependencies
        run: pdm install

      - name: Build C++ extension
        run: |
          brew_prefix="$(brew --prefix)"
          # nanobind ships as a Python package in the PDM venv; build against that
          # interpreter so CMake can locate its CMake config.
          cmake -S . -B build \
            -DCMAKE_PREFIX_PATH="$brew_prefix" \
            -DCMAKE_INCLUDE_PATH="$brew_prefix/include" \
            -DCMAKE_LIBRARY_PATH="$brew_prefix/lib" \
            -DPython_EXECUTABLE="$PWD/.venv/bin/python" \
            -DPython3_EXECUTABLE="$PWD/.venv/bin/python"
          cmake --build build

      - name: Run C++ tests
        run: ctest --test-dir build --output-on-failure

      - name: Upload cmake logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cmake-logs-${{ github.run_id }}
          path: /tmp/cmk_*.log
          retention-days: 7

      - name: Run Python tests
        continue-on-error: true
        run: python tests/py_tests/heston_fit.py
