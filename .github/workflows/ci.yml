name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Homebrew dependencies
        run: brew install nlopt boost pybind11

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PDM
        run: pip install pdm

      - name: Cache PDM dependencies
        uses: actions/cache@v4
        with:
          path: .venv
          key: pdm-${{ runner.os }}-${{ hashFiles('pdm.lock') }}
          restore-keys: |
            pdm-${{ runner.os }}-

      - name: Install Python dependencies
        run: pdm install

      - name: Build C++ extension
        continue-on-error: true
        run: |
          cmake -B build 2>&1 | tee /tmp/cmk_cfg.log
          RC1=${PIPESTATUS[0]}
          cmake --build build 2>&1 | tee /tmp/cmk_bld.log
          RC2=${PIPESTATUS[0]}
          echo "CFG=$RC1 BLD=$RC2"
          echo "$RC1" > /tmp/ci_cfg_rc.txt
          echo "$RC2" > /tmp/ci_bld_rc.txt

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ github.run_id }}
          path: |
            /tmp/cmk_cfg.log
            /tmp/cmk_bld.log
            /tmp/ci_cfg_rc.txt
            /tmp/ci_bld_rc.txt
          retention-days: 1

      - name: Fail if build errored
        if: always()
        run: |
          CFG=$(cat /tmp/ci_cfg_rc.txt 2>/dev/null || echo 0)
          BLD=$(cat /tmp/ci_bld_rc.txt 2>/dev/null || echo 0)
          echo "cmake config exit code: $CFG"
          echo "cmake build exit code: $BLD"
          if [ "$CFG" != "0" ]; then
            echo "::error title=cmake configure failed ($CFG)::"
            head -20 /tmp/cmk_cfg.log 2>/dev/null
            exit 1
          fi
          if [ "$BLD" != "0" ]; then
            echo "::error title=cmake build failed ($BLD)::"
            tail -40 /tmp/cmk_bld.log 2>/dev/null
            exit 1
          fi
          echo "Build succeeded"

      - name: Run C++ tests
        run: cd build && ctest --output-on-failure

      - name: Run Python tests
        continue-on-error: true
        run: |
          python tests/py_tests/garch_test.py
          python tests/py_tests/heston_fit.py
